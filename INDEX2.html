<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hỏi vuii</title>
    
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #ffe6f0;
    font-family: Arial;
    text-align: center;
  }

  .box {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  h2 {
    margin-bottom: 30px;
  }

  button {
    padding: 12px 25px;
    font-size: 18px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
  }

  #yes {
    background: #ff4d6d;
    color: white;
  }
  #no {
    background: #ccc;
  }
 #overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);

  display: flex;
  justify-content: center;
  align-items: center;

  opacity: 0;
  pointer-events: none;
  transition: 0.5s;
  z-index: 9999;
}

/* 💖 TIM SIÊU TO */
.heart {
  position: relative;
  width: 400px;
  height: 400px;
  background: #ff4d6d;
  transform: rotate(-45deg);

  display: flex;
  justify-content: center;
  align-items: center;
}

/* 2 phần tròn */
.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: #ff4d6d;
  border-radius: 50%;
}

.heart::before {
  top: -200px;
  left: 0;
}

.heart::after {
  left: 200px;
  top: 0;
}

/* 💡 CHỮ TO + ĐẸP */
.heart-text {
  position: absolute;
  z-index: 2;

  transform: rotate(45deg);
  color: white;

  font-size: 48px; /* 👈 chữ to hơn */
  font-weight: bold;

  text-align: center;
  width: 75%;
  line-height: 1.4;

  text-shadow: 0 0 15px white;
}
</style>
</head>
<body>
<video id="bgMusic" loop style="display:none;">
  <source src="CMNDTCT.mp4" type="video/mp4">
</video>
<script>document.getElementById("bgMusic").play();</script>
<div id="overlay">
  <div class="heart">
    <div class="heart-text">
      Tui cũm yêuu Beoo nhìuuuu ạaa 💖
    </div>
  </div>
</div>
<div class="box">
  <h2>Em có thích tôi không? 😳</h2>
  <button id="yes">Có 💖</button>
  <button id="no">Không 😢</button>
<script>
let yesBtn = document.getElementById("yes");
let noBtn = document.getElementById("no");

let yesSize = 1;
let noSize = 1;

noBtn.addEventListener("click", () => {
  // 👉 nhỏ lại
  noSize -= 0.1;
  noBtn.style.transform = `scale(${noSize})`;

  // 👉 đổi chữ
  if(noSize <= 0.9){
    noBtn.innerText = "Cái gìi 🤨";
  }
  if(noSize <= 0.8){
    noBtn.innerText = "Cho suy nghĩ lạii 😢";
  }
  if(noSize <= 0.7){
    noBtn.innerText = "Tui buồn rồi đó 😭";
  }
  if(noSize <= 0.6){
    noBtn.innerText = "Bấm có đi cho thêm kẹo ănn";
  }
  if(noSize <= 0.5){
    noBtn.innerText = "Dận luonn 😭";
  }
  if(noSize <= 0.4){
    noBtn.innerText = "HuHuHu 😭";
  }
  if(noSize <= 0.3){
    noBtn.innerText = "😭";
  }
  // 👉 YES to lên
  yesSize += 0.3;
  yesBtn.style.transform = `scale(${yesSize})`;
  // 🏃‍♂️ NHẢY 1 LẦN SAU KHI CLICK
  const maxX = window.innerWidth - noBtn.offsetWidth;
  const maxY = window.innerHeight - noBtn.offsetHeight;

  const randomX = Math.random() * maxX;
  const randomY = Math.random() * maxY;

  noBtn.style.position = "absolute";
  noBtn.style.left = randomX + "px";
  noBtn.style.top = randomY + "px";
});

// 👉 YES
let overlay = document.getElementById("overlay");
let heartText = document.querySelector(".heart-text");
yesBtn.addEventListener("click", () => {
  overlay.style.opacity = "1";
  overlay.style.pointerEvents = "auto";

  // 💡 đổi chữ theo điều kiện
  if(noSize <= 1) {
    heartText.innerText = "Dạa tui cũm yêuu Beoo nhìuuuu 🌸💖";
  }
  if(noSize <= 0.7){
    heartText.innerText = "Ấn nhầm hơi nhiều ròi nhaa 😏";
  } 
  if(noSize <= 0.5) {
    heartText.innerText = "Dận ròi đi raa 💢";
  }
  if(noSize <= 0.4) {
    heartText.innerText = "😭💔";
  }
});
</script>
</div>
</body>
</html>
